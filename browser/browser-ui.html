<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#111;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
.drag-space{height:14px;background:#111;-webkit-app-region:drag;flex-shrink:0;cursor:grab}
.titlebar{display:flex;align-items:center;background:#111;border-bottom:1px solid #222;-webkit-app-region:drag;flex-shrink:0;height:36px;padding:0 6px;gap:6px}
.search-bar{flex:1;display:flex;align-items:center;gap:6px;background:#1e1e1e;border:1px solid #333;border-radius:18px;padding:0 10px;-webkit-app-region:no-drag;height:26px}
.search-bar:focus-within{border-color:#4a9eff}
.reload-btn{width:20px;height:20px;border:none;background:transparent;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.reload-btn:hover{color:#fff}
.reload-btn svg{width:14px;height:14px;fill:currentColor}
.search-bar input{flex:1;background:transparent;border:none;color:#fff;font-size:12px;outline:none}
.search-bar input::placeholder{color:#666}
.win-btns{display:flex;-webkit-app-region:no-drag;position:relative;flex-shrink:0}
.win-btns button{width:40px;height:36px;border:none;background:transparent;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center}
.win-btns button:hover{background:#ffffff12;color:#fff}
.win-btns button.close:hover{background:#e74c3c}
.win-btns button svg{width:14px;height:14px}
.device-dropdown{position:absolute;top:50px;right:0;width:370px;max-height:75vh;background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.25);z-index:1000;display:none;overflow-y:auto;overflow-x:hidden}
.device-dropdown.show{display:block}
.device-dropdown::-webkit-scrollbar{width:6px}
.device-dropdown::-webkit-scrollbar-track{background:transparent}
.device-dropdown::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.device-dropdown-header{padding:14px 14px 8px;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee}
.device-dropdown-section{padding:10px 10px 2px}
.device-dropdown-section-title{padding:4px 2px;font-size:12px;color:#333;font-weight:700;margin-bottom:4px}
.device-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:4px 0 8px}
.device-option{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 2px 6px;border-radius:6px;cursor:pointer;transition:all .15s;border:2px solid transparent;position:relative}
.device-option:hover{background:#f5f5f5}
.device-option.active{background:#f0f7ff;border-color:#4a9eff}
.phone-preview{width:18px;height:32px;border:2px solid #bbb;border-radius:4px}
.device-option.active .phone-preview{border-color:#4a9eff}
.phone-preview::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:6px;height:1px;background:#bbb;border-radius:1px}
.device-option.active .phone-preview::after{background:#4a9eff}
.tablet-preview{width:24px;height:18px;border:2px solid #bbb;border-radius:2px}
.device-option.active .tablet-preview{border-color:#4a9eff}
.desktop-preview{width:26px;height:18px;border:2px solid #bbb;border-radius:2px;position:relative}
.desktop-preview::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:14px;height:3px;background:#bbb;border-radius:1px}
.device-option.active .desktop-preview{border-color:#4a9eff}
.device-option.active .desktop-preview::after{background:#4a9eff}
.watch-preview{width:20px;height:24px;border:2px solid #bbb;border-radius:6px;position:relative}
.watch-preview::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:10px;height:4px;background:#bbb;border-radius:2px}
.watch-preview::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:10px;height:4px;background:#bbb;border-radius:2px}
.device-option.active .watch-preview{border-color:#4a9eff}
.device-option.active .watch-preview::before,.device-option.active .watch-preview::after{background:#4a9eff}
.label{font-size:9px;color:#555;text-align:center;line-height:1.15}
.device-option.active .label{color:#4a9eff;font-weight:600}
.pro-badge{font-size:7px;color:#fff;background:#4a9eff;border-radius:3px;padding:1px 3px;font-weight:700;position:absolute;top:1px;right:1px;line-height:1}
.new-badge{font-size:7px;color:#fff;background:#4caf50;border-radius:3px;padding:1px 3px;font-weight:700;position:absolute;top:1px;right:1px;line-height:1}
.content{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0a0a0a}
#mockup-wrap{position:relative;display:inline-block;overflow:hidden}
#mockup-wrap iframe{position:absolute;border:none;background:#fff}
#mockup-wrap img{position:absolute;top:0;left:0;pointer-events:none;width:100%;height:100%}
</style>

'apple-watch-series-10':'apple-watch-series-10',
'macbook-air':'macbook-air','macbook-pro-16':'apple-macbook-pro-16-2021',
'dell-latitude':'dell-latitude-14-3420','samsung-tv':'samsung-smart-tv',
};
function bld(l,g,t){const gr=document.getElementById(g);l.forEach(d=>{
const slug=deviceMap[d.id]||d.id;const cfg=devicesConfig.find(c=>c.slug===slug);
let b=cfg&&cfg.pro?'<span class="pro-badge">PRO</span>':'';
const e=document.createElement('div');e.className='device-option';e.setAttribute('data-device',d.id);e.onclick=()=>selectDevice(d.id);
e.innerHTML=b+'<div class="'+t+'-preview"></div><div class="label">'+d.n.replace(/\n/g,'<br>')+'</div>';gr.appendChild(e)});}
bld(applePhones,'apple-phones-grid','phone');bld(androidPhones,'android-phones-grid','phone');
bld(tablets,'tablets-grid','tablet');bld(wearables,'wearables-grid','watch');
bld(macbooks,'macbooks-grid','desktop');
function toggleDropdown(){dropdown.classList.toggle('show')}
document.addEventListener('click',e=>{if(!e.target.closest('.win-btns')&&!e.target.closest('.device-dropdown'))dropdown.classList.remove('show')});
function selectDevice(id){curDev=id;document.querySelectorAll('.device-option').forEach(o=>o.classList.remove('active'));document.querySelector('[data-device="'+id+'"]')?.classList.add('active');dropdown.classList.remove('show');applyDevice()}
function applyDevice(){
const slug=deviceMap[curDev];const cfg=devicesConfig.find(c=>c.slug===slug);
if(!slug||!cfg){mw.style.cssText='width:100%;height:100%;display:flex;align-items:center;justify-content:center;';mw.innerHTML='<iframe id="mf" src="'+getUrl()+'" style="width:100%;height:100%;border:none;"></iframe>';return;}
const ip=assets+slug+'/device.png';
const area=mw.parentElement.getBoundingClientRect();
const s=Math.min((area.width-40)/cfg.pngW,(area.height-40)/cfg.pngH,1);
const cw=Math.round(cfg.pngW*s),ch=Math.round(cfg.pngH*s);
const ix=Math.round(cfg.sx*s),iy=Math.round(cfg.sy*s);
const fw=Math.round(cfg.sw*s),fh=Math.round(cfg.sh*s);
mw.style.cssText='position:relative;width:'+cw+'px;height:'+ch+'px;flex-shrink:0;';
mw.innerHTML='<iframe id="mf" src="'+getUrl()+'" style="position:absolute;left:'+ix+'px;top:'+iy+'px;width:'+fw+'px;height:'+fh+'px;border:none;background:#fff;z-index:1;"></iframe><img src="'+ip+'" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;"/>';
}
function reloadPage(){const f=document.getElementById('mf');if(f)f.src=f.src}
urlInput.addEventListener('keydown',e=>{if(e.key==='Enter'){let u=urlInput.value.trim();if(!u.startsWith('http'))u='https://'+u;window.prevUrl=u;const f=document.getElementById('mf');if(f)f.src=u}});
function closeWindow(){window.close()}
window.setDevice=id=>selectDevice(id);
</script>
</body>
</html>
